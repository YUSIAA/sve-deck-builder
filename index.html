<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVE プロフェッショナル・デッキビルダ―</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

<div class="container">
    <div class="panel left-panel">
        <h2 style="margin:0 0 10px 0; font-size:18px;">カードライブラリ</h2>
        <div class="filter-bar">
            <input type="text" id="search-name" class="input-name" placeholder="カード名検索..." oninput="filterCards()">
            <input type="text" id="search-ability" class="input-ability" placeholder="能力・テキスト検索..." oninput="filterCards()">
            <div class="suggest-container">
                <input type="text" id="search-tribe" style="width:100%; box-sizing:border-box;" placeholder="種族サジェスト..." oninput="handleTribeInput(this)" onfocus="handleTribeInput(this)">
                <div id="tribe-suggest-list" class="suggest-list"></div>
            </div>
            <select id="filter-class" onchange="filterCards()">
                <option value="">全てのクラス</option>
                <option value="Forestcraft">エルフ</option><option value="Swordcraft">ロイヤル</option>
                <option value="Runecraft">ウィッチ</option><option value="Dragoncraft">ドラゴン</option>
                <option value="Abysscraft">ナイトメア</option><option value="Havencraft">ビショップ</option>
                <option value="Neutral">ニュートラル</option>
            </select>
            <select id="filter-cost" onchange="filterCards()">
                <option value="">コスト</option>
                <option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8+</option>
            </select>
            <button id="btn-toggle-view" class="btn-view-toggle" onclick="toggleViewMode('lib')">画像表示に切替</button>
        </div>
        <div id="card-pool" class="scroll-area"></div>
    </div>

    <div class="panel right-panel" id="deck-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h2 style="margin:0; font-size:18px;">デッキ (M:<span id="main-count">0</span> E:<span id="evolve-count">0</span>)</h2>
            <div class="action-btns-header" style="display:flex; gap:5px;">
                <button id="btn-toggle-deck-view" class="btn-view-toggle" onclick="toggleViewMode('deck')">画像表示に切替</button>
                <button style="background:#a0aec0; color:white; font-size:11px;" onclick="clearDeck()">全クリア</button>
            </div>
        </div>
        
        <div class="mana-curve-container">
            <div class="chart-area" id="mana-curve">
                <div class="bar-wrapper"><div class="bar" style="height:0px"></div><span class="bar-label" style="font-size:9px">0</span></div>
                <div class="bar-wrapper"><div class="bar" style="height:0px"></div><span class="bar-label" style="font-size:9px">1</span></div>
                <div class="bar-wrapper"><div class="bar" style="height:0px"></div><span class="bar-label" style="font-size:9px">2</span></div>
                <div class="bar-wrapper"><div class="bar" style="height:0px"></div><span class="bar-label" style="font-size:9px">3</span></div>
                <div class="bar-wrapper"><div class="bar" style="height:0px"></div><span class="bar-label" style="font-size:9px">4</span></div>
                <div class="bar-wrapper"><div class="bar" style="height:0px"></div><span class="bar-label" style="font-size:9px">5</span></div>
                <div class="bar-wrapper"><div class="bar" style="height:0px"></div><span class="bar-label" style="font-size:9px">6</span></div>
                <div class="bar-wrapper"><div class="bar" style="height:0px"></div><span class="bar-label" style="font-size:9px">7</span></div>
                <div class="bar-wrapper"><div class="bar" style="height:0px"></div><span class="bar-label" style="font-size:9px">8+</span></div>
            </div>
        </div>

        <div id="deck-list" class="scroll-area"></div>
        
        <div id="export-controls" style="margin-top:10px;">
            <button class="btn-add" style="width:100%; margin-bottom:5px; background:#ed64a6;" onclick="exportAsImage()">デッキを画像として保存 (PNG)</button>
            <button class="btn-add" style="width:100%; margin-bottom:5px; background:#48bb78;" onclick="exportToArena()">TCG-Arena形式で出力</button>
            <textarea id="export-text" rows="3" readonly placeholder="Output list..." style="width:100%; box-sizing:border-box; margin-bottom:5px; font-size:11px; font-family:inherit;"></textarea>
            <button style="background:#4a5568; width:100%;" onclick="copyToClipboard()">テキストをコピー</button>
        </div>
    </div>
</div>

<div id="card-modal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-left"><img id="modal-card-img" src=""></div>
        <div class="modal-right">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-card-name" class="modal-title"></div>
            <div id="modal-card-tribe" style="background:#f1f5f9; padding:5px 12px; border-radius:6px; font-size:13px; display:inline-block; margin-bottom:15px; color:#475569;"></div>
            <div id="modal-card-text" style="font-size:14px; line-height:1.7; white-space:pre-wrap; border-top:1px solid #eee; padding-top:15px;"></div>
        </div>
    </div>
</div>

<script>
    let masterData = {}; let tribeList = []; let deck = {};
    let viewModeLib = 'list'; let viewModeDeck = 'list';
    const classMap = { 'Forestcraft': 'エルフ', 'Swordcraft': 'ロイヤル', 'Runecraft': 'ウィッチ', 'Dragoncraft': 'ドラゴン', 'Abysscraft': 'ナイトメア', 'Havencraft': 'ビショップ', 'Neutral': 'ニュートラル' };

    const imageObserver = new IntersectionObserver((entries, obs) => {
        entries.forEach(e => { if (e.isIntersecting) { loadImg(e.target); obs.unobserve(e.target); } });
    }, { rootMargin: '300px' });

    document.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem('sve-deck-draft');
        if (saved) { try { deck = JSON.parse(saved); } catch(e) { console.error("Load failed", e); } }

        fetch('./master_card_data.json').then(r => r.json()).then(d => { 
            masterData = d; 
            renderCardPool();
            if (Object.keys(deck).length > 0) updateUI();
        });
        fetch('./tribes.json').then(r => r.json()).then(d => { tribeList = Object.keys(d); });
        document.addEventListener('click', e => { if (!e.target.closest('.suggest-container')) document.getElementById('tribe-suggest-list').style.display = 'none'; });
    });

    function saveDraft() { localStorage.setItem('sve-deck-draft', JSON.stringify(deck)); }

    function clearDeck() {
        if (confirm("デッキをすべて空にしますか？")) { deck = {}; updateUI(); }
    }

    async function exportAsImage() {
        const target = document.getElementById('deck-panel');
        const controls = document.getElementById('export-controls');
        const headerBtns = document.querySelector('.action-btns-header');
        controls.style.display = 'none';
        headerBtns.style.display = 'none';
        const canvas = await html2canvas(target, { useCORS: true, scale: 2, backgroundColor: "#f4f7f9" });
        controls.style.display = 'block';
        headerBtns.style.display = 'flex';
        const link = document.createElement('a');
        link.download = `sve-deck-${new Date().getTime()}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    function toggleViewMode(target) {
        if (target === 'lib') {
            viewModeLib = (viewModeLib === 'list' ? 'gallery' : 'list');
            document.getElementById('btn-toggle-view').innerText = (viewModeLib === 'list' ? '画像表示に切替' : 'リスト表示に切替');
            renderCardPool();
        } else {
            viewModeDeck = (viewModeDeck === 'list' ? 'gallery' : 'list');
            document.getElementById('btn-toggle-deck-view').innerText = (viewModeDeck === 'list' ? '画像表示に切替' : 'リスト表示に切替');
            renderDeckList();
        }
    }

    function getUrls(id, card) {
        const isU = id.endsWith("u"); const clean = isU ? id.slice(0, -1) : id;
        const f = clean.split("-")[0].toUpperCase(); const b = clean.toLowerCase(); const ub = b.replace("-", "_");
        let u = []; if (card.jp && card.jp.image) u.push(card.jp.image);
        if (isU) {
            u.push(`https://shadowverse-evolve.com/wordpress/wp-content/images/cardlist/${f}/${b}_ura.png`,
                   `https://shadowverse-evolve.com/wordpress/wp-content/images/cardlist/${f}/${b}_back.png`,
                   `https://shadowverse-evolve.com/wordpress/wp-content/images/cardlist/${f}/${ub}_ura.png`);
        } else {
            u.push(`https://shadowverse-evolve.com/wordpress/wp-content/images/cardlist/${f}/${b}.png`,
                   `https://shadowverse-evolve.com/wordpress/wp-content/images/cardlist/${f}/${b}_front.png`,
                   `https://shadowverse-evolve.com/wordpress/wp-content/images/cardlist/${f}/${ub}.png`);
        }
        return [...new Set(u)].filter(v => v);
    }

    function loadImg(el) {
        const id = el.dataset.id;
        if (!masterData[id]) return;
        const urls = getUrls(id, masterData[id]);
        let i = 0;
        const tryLoad = () => {
            const t = new Image(); t.src = urls[i];
            t.onload = () => { el.src = urls[i]; el.classList.add('loaded'); };
            t.onerror = () => { i++; if (i < urls.length) tryLoad(); else el.src = "https://via.placeholder.com/150x210?text=No+Img"; };
        };
        tryLoad();
    }

    function showDetails(id) {
        const c = masterData[id]; const mImg = document.getElementById('modal-card-img'); const urls = getUrls(id, c); let i = 0;
        mImg.onerror = function() { i++; if (i < urls.length) this.src = urls[i]; else this.src = ""; };
        mImg.src = urls[0];
        document.getElementById('modal-card-name').innerText = c.jp.name;
        document.getElementById('modal-card-tribe').innerText = c.jp.tribe || "なし";
        document.getElementById('modal-card-text').innerText = c.jp.text || "テキストなし";
        document.getElementById('card-modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('card-modal').style.display = 'none'; }

    // --- ここが重要：タグ判定ロジックの強化 ---
    function renderCardPool() {
        const pool = document.getElementById('card-pool'); pool.innerHTML = '';
        pool.className = 'scroll-area' + (viewModeLib === 'gallery' ? ' gallery-grid' : '');
        const frag = document.createDocumentFragment();
        for (const id in masterData) {
            const c = masterData[id]; const div = document.createElement('div');
            div.className = viewModeLib === 'list' ? 'card-row' : 'card-item-wrapper';
            div.dataset.name = c.jp.name; div.dataset.text = c.jp.text || ""; div.dataset.tribe = c.jp.tribe || ""; div.dataset.class = c.common.class; div.dataset.cost = c.common.cost;
            if (viewModeLib === 'list') {
                const jpClass = classMap[c.common.class] || c.common.class;
                
                // 大文字小文字に関わらず判定
                const isEvolve = c.common.isEvolve === true;
                const isAdvance = (c.common.type && c.common.type.toLowerCase() === 'advance');
                
                const evTag = isEvolve ? '<span class="evolve-tag">EVOLVE</span>' : '';
                const adTag = isAdvance ? '<span class="advance-tag">ADVANCE</span>' : '';
                
                div.innerHTML = `<div class="card-info-group"><div class="card-name">${c.jp.name} ${evTag}${adTag}</div><div style="font-size:11px; color:#666;">${jpClass} | ${c.common.cost}コスト</div></div>
                                 <div class="action-btns"><button class="btn-detail" onclick="showDetails('${id}')">詳細</button><button class="btn-add" onclick="addCard('${id}')">追加</button></div>`;
            } else {
                const img = document.createElement('img'); img.dataset.id = id; img.onclick = () => showDetails(id); imageObserver.observe(img);
                div.innerHTML = `<div class="add-overlay" onclick="addCard('${id}')">＋</div>`;
                div.prepend(img);
            }
            frag.appendChild(div);
        }
        pool.appendChild(frag);
        filterCards();
    }

    function filterCards() {
        const n = document.getElementById('search-name').value.toLowerCase();
        const a = document.getElementById('search-ability').value.toLowerCase();
        const t = document.getElementById('search-tribe').value.toLowerCase();
        const c = document.getElementById('filter-class').value;
        const s = document.getElementById('filter-cost').value;
        Array.from(document.getElementById('card-pool').children).forEach(item => {
            const match = item.dataset.name.toLowerCase().includes(n) && item.dataset.text.toLowerCase().includes(a) && 
                          (!t || item.dataset.tribe.toLowerCase().includes(t)) && (!c || item.dataset.class === c) && 
                          (!s || (s === "8" ? parseInt(item.dataset.cost) >= 8 : item.dataset.cost === s));
            item.style.display = match ? (viewModeLib === 'gallery' ? 'block' : 'flex') : 'none';
        });
    }

    function handleTribeInput(el) {
        const val = el.value.toLowerCase(); const list = document.getElementById('tribe-suggest-list'); list.innerHTML = '';
        const matches = tribeList.filter(t => t.toLowerCase().includes(val)).slice(0, 12);
        matches.forEach(m => {
            const d = document.createElement('div'); d.className = 'suggest-item'; d.innerText = m;
            d.onclick = () => { el.value = m; list.style.display = 'none'; filterCards(); };
            list.appendChild(d);
        });
        list.style.display = matches.length ? 'block' : 'none';
        filterCards();
    }

    function addCard(id) { if ((deck[id] || 0) < 3) { deck[id] = (deck[id] || 0) + 1; updateUI(); } }
    function removeOne(id) { if (deck[id]) { deck[id]--; if (!deck[id]) delete deck[id]; updateUI(); } }
    function removeAll(id) { if (deck[id]) { delete deck[id]; updateUI(); } }
    function updateUI() { renderDeckList(); updateManaCurve(); saveDraft(); }

    function renderDeckList() {
        const list = document.getElementById('deck-list'); list.innerHTML = '';
        let mc = 0, ec = 0; const main = [], evo = [];
        for (const id in deck) {
            const c = masterData[id]; if(!c) continue;
            const item = { id, c, count: deck[id] };
            
            // デッキ分け判定も柔軟に
            const isEvolveSection = (c.common.isEvolve === true || (c.common.type && c.common.type.toLowerCase() === 'advance'));
            
            if (isEvolveSection) { ec += deck[id]; evo.push(item); }
            else { mc += deck[id]; main.push(item); }
        }
        const deckSorter = (a, b) => (parseInt(a.c.common.cost) || 0) - (parseInt(b.c.common.cost) || 0) || a.c.jp.name.localeCompare(b.c.jp.name, 'ja');
        main.sort(deckSorter); evo.sort(deckSorter);
        document.getElementById('main-count').innerText = mc; document.getElementById('evolve-count').innerText = ec;

        const createSection = (cards, title) => {
            if (!cards.length) return;
            const t = document.createElement('div'); t.className = 'deck-section-title'; t.innerText = title; list.appendChild(t);
            if (viewModeDeck === 'gallery') {
                const g = document.createElement('div'); g.className = 'deck-grid';
                cards.forEach(item => {
                    const w = document.createElement('div'); w.className = 'card-item-wrapper';
                    const img = document.createElement('img'); img.dataset.id = item.id; img.onclick = () => showDetails(item.id); imageObserver.observe(img);
                    w.innerHTML = `<div class="btn-remove-img btn-minus-img" onclick="removeOne('${item.id}')">－</div><div class="btn-remove-img btn-plus-img" onclick="addCard('${item.id}')">＋</div><div class="btn-remove-img btn-delete-img" onclick="removeAll('${item.id}')">×</div><div class="card-count-badge">${item.count}</div>`;
                    w.prepend(img); g.appendChild(w);
                });
                list.appendChild(g);
            } else {
                cards.forEach(item => {
                    const row = document.createElement('div'); row.className = 'card-row';
                    const isE = item.c.common.isEvolve === true;
                    const isA = (item.c.common.type && item.c.common.type.toLowerCase() === 'advance');
                    const evTag = isE ? '<span class="evolve-tag">EVOLVE</span>' : '';
                    const adTag = isA ? '<span class="advance-tag">ADVANCE</span>' : '';
                    row.innerHTML = `<div class="card-info-group"><div class="card-name">${item.c.jp.name} x${item.count} ${evTag}${adTag}</div><div style="font-size:11px; color:#666;">${item.c.common.cost}コスト</div></div>
                                     <div class="action-btns">
                                         <button class="btn-detail" onclick="showDetails('${item.id}')">詳細</button>
                                         <button class="btn-plus-one" onclick="addCard('${item.id}')">＋</button>
                                         <button class="btn-minus-one" onclick="removeOne('${item.id}')">－</button>
                                         <button class="btn-delete-all" onclick="removeAll('${item.id}')">×</button>
                                     </div>`;
                    list.appendChild(row);
                });
            }
        };
        createSection(main, 'メイン'); createSection(evo, 'エボルヴ');
    }

    function updateManaCurve() {
        const counts = new Array(9).fill(0);
        for (const id in deck) {
            const c = masterData[id]; if(!c) continue;
            const isEOrA = (c.common.isEvolve === true || (c.common.type && c.common.type.toLowerCase() === 'advance'));
            if (!isEOrA) { const cost = parseInt(c.common.cost) || 0; counts[cost >= 8 ? 8 : cost] += deck[id]; }
        }
        const max = Math.max(...counts, 1);
        Array.from(document.getElementById('mana-curve').children).forEach((w, i) => {
            w.querySelector('.bar').style.height = (counts[i] / max * 50) + 'px';
        });
    }

    function exportToArena() {
        let r = ""; for (const id in deck) {
            let n = masterData[id].en?.name || masterData[id].jp.name;
            if (masterData[id].common.isEvolve && !n.includes("(Evolved)")) n += " (Evolved)"; r += `${deck[id]} ${n}\n`;
        }
        document.getElementById('export-text').value = r + "Sideboard:";
    }
    function copyToClipboard() { const t = document.getElementById('export-text'); t.select(); document.execCommand('copy'); alert('コピーしました！'); }
</script>
</body>
</html>
